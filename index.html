<!DOCTYPE html>
<html>
<head>
<title>Atlantic Postal Tracking</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:30px;
max-width:500px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:12px;
width:80%;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 20px;
margin-top:10px;
background:#0b5ed7;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
}
</style>

</head>

<body>

<div class="box">

<h2>Atlantic Postal Tracking</h2>

<input id="track" placeholder="Enter tracking number">

<br><br>

<button onclick="track()">Track Package</button>

<div id="result"></div>

</div>

<script>

const API_TOKEN = "patHtcGZMxPeArKGm";
const BASE_ID = "appd7hoLVjK4UkKsm";
const TABLE_NAME = "Table 1";

function track(){

let number = document.getElementById("track").value;

fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`,{
headers:{
Authorization:`Bearer ${API_TOKEN}`
}
})

.then(res=>res.json())

.then(data=>{

let found=false;

data.records.forEach(record=>{

if(record.fields["Tracking Number"] === number){

found=true;

document.getElementById("result").innerHTML=

"<b>Status:</b> "+record.fields["Shipping Status"]+
"<br><b>Location:</b> "+record.fields["Current Location"];

}

});

if(!found){

document.getElementById("result").innerHTML="Tracking number not found";

}

})

}

</script>

</body>
</html>

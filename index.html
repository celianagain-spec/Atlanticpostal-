<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlantic Postal Tracking</title>

<style>
body{
font-family:Arial;
background:#e9e9e9;
margin:0;
text-align:center;
}

.header{
background:#0c4a73;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
margin-top:40px;
}

input{
width:260px;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#0c4a73;
color:white;
border:none;
border-radius:6px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.card{
background:white;
width:90%;
max-width:400px;
margin:30px auto;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:left;
}
</style>
</head>

<body>

<div class="header">
Atlantic Postal Tracking
</div>

<div class="container">

<input type="text" id="trackingInput" value="AP123456">

<br><br>

<button onclick="track()">Track Package</button>

<div id="result"></div>

</div>

<script>

const API_TOKEN = "patHtcGZMxPeArKGm"
const BASE_ID = "appd7hoLVjK4UkKsm"

async function track(){

let trackingNumber = document.getElementById("trackingInput").value

let url = `https://api.airtable.com/v0/${BASE_ID}/Table%201?filterByFormula={Tracking Number}='${trackingNumber}'`

let response = await fetch(url,{
headers:{
Authorization:`Bearer ${API_TOKEN}`
}
})

let data = await response.json()

if(data.records.length > 0){

let r = data.records[0].fields

document.getElementById("result").innerHTML = `

<div class="card">

<b>Tracking Number</b><br>
${r["Tracking Number"]}<br><br>

<b>Package</b><br>
${r["Name"]}<br><br>

<b>Receiver</b><br>
${r["Receiver Name"]}

</div>

`

}else{

document.getElementById("result").innerHTML =
"<p style='color:red'>Tracking number not found</p>"

}

}

</script>

</body>
</html>

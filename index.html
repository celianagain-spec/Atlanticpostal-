<!DOCTYPE html>
<html>
<head>
<title>Atlantic Postal Tracking</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#0a58ca;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
text-align:left;
}
</style>

</head>

<body>

<div class="container">

<h2>Atlantic Postal Tracking</h2>

<input id="trackingInput" placeholder="Enter Tracking Number">

<br><br>

<button onclick="track()">Track Package</button>

<div id="result"></div>

</div>

<script>

const BASE_ID = "appd7hoLVjK4UkKsm"
const TABLE_NAME = "Table%201"
const API_TOKEN = "patHtcGZMxPeArKGm"

async function track(){

let trackingNumber =
document.getElementById("trackingInput").value;

let url =
`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?filterByFormula={Tracking Number}='${trackingNumber}'`;

let response = await fetch(url,{
headers:{
Authorization:`Bearer ${API_TOKEN}`
}
});

let data = await response.json();

let result = document.getElementById("result");

if(!data.records || data.records.length==0){

result.innerHTML = "<h3>Tracking number not found</h3>";
return;

}

let r = data.records[0].fields;

result.innerHTML = `

<h3>Status: ${r["Shipping Status"]}</h3>

<p><b>Receiver:</b> ${r["Receiver Name"]}</p>

<p><b>Origin:</b> ${r["Origin Country"]}</p>

<p><b>Destination:</b> ${r["Destination Country"]}</p>

<p><b>Shipping Date:</b> ${r["Shipping date"]}</p>

<p><b>Estimated Delivery:</b> ${r["Estimated Delivery Date"]}</p>

`;

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlantic Postal Tracking</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#0a3d62;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
margin-top:40px;
}

input{
width:260px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 20px;
background:#0a3d62;
color:white;
border:none;
border-radius:6px;
font-size:16px;
margin-left:10px;
cursor:pointer;
}

button:hover{
background:#074a8b;
}

.card{
background:white;
width:90%;
max-width:420px;
margin:30px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:left;
}

.title{
font-weight:bold;
margin-top:10px;
color:#333;
}

.value{
margin-bottom:10px;
}

.error{
color:red;
margin-top:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
Atlantic Postal Tracking
</div>

<div class="container">

<input type="text" id="trackingInput" value="AP123456">

<button onclick="track()">Track Package</button>

<div id="result"></div>

</div>

<script>

const API_TOKEN = "patHtcGZMxPeArKGm"
const BASE_ID = "appd7hoLVjK4UkKsm"
const TABLE_NAME = "Table 1"

async function track(){

let trackingNumber = document.getElementById("trackingInput").value

let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?filterByFormula={Tracking Number}='${trackingNumber}'`

let response = await fetch(url,{
headers:{
Authorization:`Bearer ${API_TOKEN}`
}
})

let data = await response.json()

if(data.records.length > 0){

let r = data.records[0].fields

document.getElementById("result").innerHTML = `

<div class="card">

<div class="title">Tracking Number</div>
<div class="value">${r["Tracking Number"]}</div>

<div class="title">Receiver</div>
<div class="value">${r["Receiver Name"]}</div>

<div class="title">Origin</div>
<div class="value">${r["Origin Country"]}</div>

<div class="title">Destination</div>
<div class="value">${r["Destination Country"]}</div>

<div class="title">Shipping Status</div>
<div class="value">${r["Shipping Status"]}</div>

<div class="title">Shipping Date</div>
<div class="value">${r["Shipping date"]}</div>

<div class="title">Estimated Delivery</div>
<div class="value">${r["Estimated Delivery Date"]}</div>

</div>

`

}else{

document.getElementById("result").innerHTML = "<div class='error'>Tracking number not found</div>"

}

}

track()

</script>

</body>
</html>

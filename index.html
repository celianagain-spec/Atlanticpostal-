<!DOCTYPE html>
<html>
<head>
<title>Track Shipment</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px 20px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
}
</style>

</head>

<body>

<h2>Track Your Shipment</h2>

<input type="text" id="trackingInput" placeholder="Enter Tracking Number">
<button onclick="trackShipment()">Track</button>

<div id="result"></div>

<script>

async function trackShipment(){

let trackingNumber = document.getElementById("trackingInput").value;

let token = "patOreWQsQ8Zb4yuQ";
let baseId = "apphbOga6LGmfFlbT";
let table = "shipment";

let url = `https://api.airtable.com/v0/${baseId}/${table}?filterByFormula={Tracking Number}='${trackingNumber}'`;

let response = await fetch(url,{
headers:{
Authorization: `Bearer ${token}`
}
});

let data = await response.json();

if(data.records.length > 0){

let record = data.records[0].fields;

document.getElementById("result").innerHTML = `
Tracking Number: ${record["Tracking Number"]}<br>
Current Location: ${record["Current Location"]}<br>
Status: ${record["Shipment Status"]}
`;

}else{

document.getElementById("result").innerHTML = "Tracking number not found";

}

}

</script>

</body>
</html>

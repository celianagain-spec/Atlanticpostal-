<!DOCTYPE html>
<html>
<head>
<title>Atlantic Postal Tracking</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:80%;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
}

.result{
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
<h2>Atlantic Postal Tracking</h2>

<input type="text" id="trackingInput" placeholder="Enter Tracking Number">

<br>

<button onclick="track()">Track</button>

<div class="result" id="result"></div>
</div>

<script>

const API_TOKEN = "patQctgSatHFJp8GG";
const BASE_ID = "appmtpGvmklreNAqF";
const TABLE_NAME = "Tracking";

async function track(){

let trackingNumber = document.getElementById("trackingInput").value;

let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?filterByFormula={TrackingNumber}="${trackingNumber}"`;

let response = await fetch(url,{
headers:{
Authorization:`Bearer ${API_TOKEN}`
}
});

let data = await response.json();

if(data.records.length > 0){

let record = data.records[0].fields;

document.getElementById("result").innerHTML =
`
<p><b>Status:</b> ${record.Status}</p>
<p><b>Location:</b> ${record.Location}</p>
<p><b>Delivery:</b> ${record.Delivery}</p>
`;

}else{

document.getElementById("result").innerHTML = "Tracking number not found";

}

}

</script>

</body>
</html>

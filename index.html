<!DOCTYPE html>
<html>
<head>
<title>Atlantic Postal Tracking</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

.header{
background:#003366;
color:white;
padding:20px;
font-size:24px;
}

.container{
margin-top:40px;
}

input{
padding:12px;
width:260px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.card{
margin:30px auto;
width:320px;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:left;
}

.title{
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
Atlantic Postal Shipment Tracking
</div>

<div class="container">

<input type="text" id="trackingInput" value="AP123456">

<br><br>

<button onclick="track()">Track Package</button>

<div id="result"></div>

</div>

<script>

const API_TOKEN = "patHtcGZMxPeArKGm"
const BASE_ID = "appd7hoLVjK4UkKsm"
const TABLE_NAME = "Table 1"

async function track(){

let trackingNumber = document.getElementById("trackingInput").value

let url = `https://api.airtable.com/v0/${BASE_ID}/Table%201?filterByFormula=TrackingNumber="${trackingNumber}"`

let response = await fetch(url,{
headers:{
Authorization:`Bearer ${API_TOKEN}`
}
})

let data = await response.json()

if(data.records && data.records.length > 0){

let r = data.records[0].fields

document.getElementById("result").innerHTML = `

<div class="card">

<div class="title">Tracking Number</div>
${r.TrackingNumber}

<div class="title">Receiver</div>
${r["Receiver Name"]}

<div class="title">Origin</div>
${r["Origin Country"]}

<div class="title">Destination</div>
${r["Destination Country"]}

<div class="title">Shipping Status</div>
${r["Shipping Status"]}

<div class="title">Shipping Date</div>
${r["Shipping date"]}

<div class="title">Estimated Delivery</div>
${r["Estimated Delivery Date"]}

</div>

`

}else{

document.getElementById("result").innerHTML="Tracking number not found"

}

}

track()

</script>

</body>
</html>

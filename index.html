<!DOCTYPE html>
<html>
<head>
<title>Atlantic Postal Tracking</title>

<style>
body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
}

.header{
background:#003366;
color:white;
padding:20px;
font-size:24px;
}

.container{
margin-top:40px;
}

input{
padding:12px;
width:260px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.card{
margin:30px auto;
width:320px;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:left;
}

.title{
font-weight:bold;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
Atlantic Postal Shipment Tracking
</div>

<div class="container">

<input type="text" id="trackingInput" placeholder="Enter Tracking Number">
<br><br>
<button onclick="track()">Track Package</button>

<div id="result"></div>

</div>

<script>

const API_TOKEN = "patt8AZo88X0D7ERo";
const BASE_ID = "appd7hoLVjK4UkKsm";
const TABLE_NAME = "Table 1";

async function track(){

let trackingNumber = document.getElementById("trackingInput").value;

let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?filterByFormula={TrackingNumber}="${trackingNumber}"`;

let response = await fetch(url,{
headers:{
Authorization:`Bearer ${API_TOKEN}`
}
});

let data = await response.json();

if(data.records.length > 0){

let r = data.records[0].fields;

document.getElementById("result").innerHTML = `

<div class="card">

<div class="title">Tracking Number</div>
${r.TrackingNumber}

<br><br>

<div class="title">Status</div>
${r["Shipping Status"]}

<br><br>

<div class="title">Current Location</div>
${r["Current Location"]}

<br><br>

<div class="title">Estimated Delivery</div>
${r["Estimated Delivery Date"]}

<br><br>

<div class="title">Receiver</div>
${r["Receiver Name"]}

</div>

`;

}else{

document.getElementById("result").innerHTML="Tracking number not found";

}

}

</script>

</body>
</html>
